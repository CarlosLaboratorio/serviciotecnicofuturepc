<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Servis de PC{% endblock %}</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body>
        <header>
            <nav class="navbar navbar-light bg-light static-top">
                <div class="container">
                    <a class="navbar-brand" href="{% url 'myapp:index' %}">Inicio</a>
                    <a class="navbar-brand" href="{% url 'myapp:clientes' %}">Clientes</a>
                    <a class="navbar-brand" href="{% url 'myapp:tecnicos' %}">Tecnicos</a>
                    <a class="navbar-brand" href="{% url 'myapp:equipos' %}">Equipo</a>
                    <a class="navbar-brand" href="{% url 'myapp:reparaciones' %}">Reparaciones</a>
                    <a class="btn btn-primary" href="#NADAAUN">INICIAR</a> </div>
            </nav>
        </header>
        <main>
            {% block content %} <!-- Contenido específico de cada página irá aquí --> {% endblock %}
        </main>
        <footer class="text-center text-white py-3 mt-auto" style="background: linear-gradient(90deg, #250397, #1a0242);">
        <div class="container">
            <p class="mb-0">&copy; 2026 Servis PC. Todos los derechos reservados.</p>
        </div>
        </footer>
    </body>
</html>
