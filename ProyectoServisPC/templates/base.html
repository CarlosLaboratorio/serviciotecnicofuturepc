{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Servis de PC{% endblock %}</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
        <link rel="stylesheet" href="{% static 'myapp/css/styles.css' %}"/>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
        />
        <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    </head>
    <body class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar navbar-expand-md navbar-light navbar-dark static-top shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-white" href="{% url 'myapp:index' %}">Inicio</a>
            <!-- Botón del menú hamburguesa (visible en móviles) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido"
            aria-controls="navbarContenido" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Contenido colapsable -->
            <div class="collapse navbar-collapse" id="navbarContenido">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link text-white btn btn-primary" href="{% url 'myapp:clientes' %}">Clientes</a></li>
                <li class="nav-item"><a class="nav-link text-white btn btn-primary" href="{% url 'myapp:tecnicos' %}">Tecnicos</a></li>
                <li class="nav-item"><a class="nav-link text-white btn btn-primary" href="{% url 'myapp:equipos' %}">Equipos</a></li>
                <li class="nav-item"><a class="nav-link text-white btn btn-primary" href="{% url 'myapp:reparaciones' %}">Reparaciones</a></li>
                <li class="nav-item"><a class="nav-link text-white btn btn-primary" href="#NADAAUN">Iniciar</a></li>
            </ul>
            </nav>

        </header>
        <main class="container my-5 pb-5">
            {% block content %} <!-- Contenido específico de cada página irá aquí --> {% endblock %}
        </main>
        <footer class="text-center text-white py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Servis PC. Todos los derechos reservados.</p>
        </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
        <script>
            AOS.init();
        </script>
    </body>
</html>
